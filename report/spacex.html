<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SpaceX 2026 AR Calendar</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: 'Space Mono', monospace; background-color: #050505; color: white; }
        .font-grotesk { font-family: 'Space Grotesk', sans-serif; }
        .a-enter-vr { display: none !important; } /* 隱藏預設 AR 按鈕 */
        
        /* 2D 桌面/手機預覽介面 */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 50;
        }

        /* AR 狀態下的 HUD 月曆圖層 */
        #ar-hud {
            display: none;
            position: absolute; top: 20px; left: 20px;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 15px; border-radius: 12px;
            z-index: 999;
            pointer-events: none;
        }

        /* 修改：不再使用 display: none 隱藏 A-Frame，這會導致 WebGL 初始化失敗產生 Script error */
        #ar-scene-container { 
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
        }
    </style>

    <script>
        // 點擊發射邏輯
        AFRAME.registerComponent('tap-to-launch', {
            init: function () {
                const el = this.el;
                const fire = el.querySelector('#engine-fire');
                let isFlying = false;

                el.addEventListener('click', function () {
                    if (isFlying) return;
                    isFlying = true;
                    if(fire) fire.setAttribute('visible', 'true');
                    el.emit('takeoff');

                    setTimeout(() => {
                        el.setAttribute('position', '0 0 -3');
                        if(fire) fire.setAttribute('visible', 'false');
                        isFlying = false;
                    }, 4500);
                });
            }
        });
    </script>
</head>
<body>

    <!-- 1. 2D 桌面/手機預覽介面 (左右分欄設計) -->
    <div id="ui-layer" class="flex flex-col lg:flex-row bg-[#050505]">
        
        <!-- 左側：完美支援 Zoom & Orbit 的 Sketchfab 模型預覽 -->
        <div class="w-full lg:w-2/3 h-[55vh] lg:h-full relative bg-black">
            <iframe 
                title="Spacex Starship Ship 24 & Booster 7 V4" 
                frameborder="0" 
                allowfullscreen 
                mozallowfullscreen="true" 
                webkitallowfullscreen="true" 
                allow="autoplay; fullscreen; xr-spatial-tracking" 
                xr-spatial-tracking 
                execution-while-out-of-viewport 
                execution-while-not-rendered 
                web-share 
                class="w-full h-full"
                src="https://sketchfab.com/models/97875d14b63e4b9ca9ed425ef4253306/embed?autostart=1&ui_theme=dark&dnt=1">
            </iframe>
            <!-- 遮蔽 Sketchfab 底部 Logo 的漸層黑條 (提升質感) -->
            <div class="absolute bottom-0 left-0 w-full h-12 bg-gradient-to-t from-black to-transparent pointer-events-none"></div>
        </div>

        <!-- 右側：2026 月曆資訊與 AR 啟動鈕 -->
        <div class="w-full lg:w-1/3 h-[45vh] lg:h-full bg-[#0a0a0a] p-8 lg:p-12 flex flex-col justify-center border-t lg:border-t-0 lg:border-l border-gray-800 shadow-2xl z-10">
            <h1 class="text-4xl lg:text-5xl font-bold font-grotesk tracking-tighter mb-1 text-white">APRIL 2026</h1>
            <p class="text-xs text-gray-400 tracking-widest mb-8">STARSHIP AR EXPERIENCE</p>
            
            <div id="calendar-2d" class="mb-10 w-full max-w-sm"></div>

            <button id="btn-enter-ar" class="w-full max-w-sm bg-white text-black hover:bg-gray-200 transition-colors py-4 rounded font-bold font-grotesk tracking-widest flex items-center justify-center gap-3">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z" />
                </svg>
                啟動 WebAR (點擊起飛)
            </button>
            <p class="text-[10px] text-gray-500 text-left mt-4 max-w-sm">
                * 桌面模式支援滑鼠縮放與旋轉 (Zoom in/out)。<br>
                * AR 擴增實境請使用支援 WebXR 的手機瀏覽器。
            </p>
        </div>
    </div>

    <!-- 2. AR 狀態下的 HUD 介面 -->
    <div id="ar-hud">
        <h2 class="text-sm font-bold text-white tracking-widest mb-2 font-grotesk">2026 APR</h2>
        <div id="calendar-ar" class="text-[8px] text-gray-300"></div>
        <div class="mt-3 py-1 px-2 bg-red-600/20 border border-red-500/50 rounded text-[9px] text-red-400 animate-pulse tracking-widest text-center">
            TAP STARSHIP TO LAUNCH
        </div>
    </div>

    <!-- 3. WebXR 3D 空間 -->
    <div id="ar-scene-container">
        <a-scene 
            id="ar-scene"
            xr-mode-ui="enabled: false" 
            webxr="optionalFeatures: dom-overlay; overlayElement: #ar-hud;"
            background="color: transparent">

            <a-camera position="0 1.6 0">
                <a-entity cursor="rayOrigin: mouse;"></a-entity>
            </a-camera>

            <a-light type="ambient" color="#ffffff" intensity="1.2"></a-light>
            <a-light type="directional" position="-1 2 1" intensity="1.5"></a-light>

            <!-- Starship AR 模型實體 -->
            <a-entity id="starship-group" position="0 0 -3" tap-to-launch 
                      animation="property: position; to: 0 15 -3; dur: 3500; startEvents: takeoff; easing: easeInQuad">
                
                <!-- 修改：為了避免在 Canvas 預覽環境中因為找不到本地 .glb 檔案而報錯，暫時切換回 A-Frame 幾何模型。 -->
                <!-- 如果你要在自己的伺服器上部署，可以把下方這些幾何圖形刪除，並換回 <a-gltf-model src="./starship.glb" scale="0.05 0.05 0.05"></a-gltf-model> -->
                <a-cylinder radius="0.3" height="2" color="#e2e8f0" metalness="0.7" roughness="0.3"></a-cylinder>
                <a-cone radius-bottom="0.3" radius-top="0" height="0.8" position="0 1.4 0" color="#cbd5e1" metalness="0.8" roughness="0.2"></a-cone>
                <a-triangle vertex-a="0 0.5 0" vertex-b="-0.6 -0.5 0" vertex-c="0 -0.5 0" position="-0.3 -0.5 0" color="#334155"></a-triangle>
                <a-triangle vertex-a="0 0.5 0" vertex-b="0.6 -0.5 0" vertex-c="0 -0.5 0" position="0.3 -0.5 0" color="#334155"></a-triangle>
                <a-triangle vertex-a="0 0.3 0" vertex-b="0.3 -0.2 0" vertex-c="0 -0.2 0" position="0.3 0.8 0" color="#334155" scale="0.5 0.5 0.5"></a-triangle>
                <a-triangle vertex-a="0 0.3 0" vertex-b="-0.3 -0.2 0" vertex-c="0 -0.2 0" position="-0.3 0.8 0" color="#334155" scale="0.5 0.5 0.5"></a-triangle>

                <!-- 噴射火焰動畫 (依附在模型底部) -->
                <a-cone id="engine-fire" radius-bottom="0" radius-top="0.25" height="1" position="0 -1.5 0" 
                        color="#f97316" material="emissive: #ea580c; emissiveIntensity: 3; transparent: true; opacity: 0.9" 
                        visible="false"
                        animation="property: scale; to: 1.2 1.5 1.2; dir: alternate; dur: 50; loop: true">
                </a-cone>
            </a-entity>
        </a-scene>
    </div>

    <script>
        // --- 產生月曆的邏輯 ---
        function renderCalendar(containerId, isSmall = false) {
            const container = document.getElementById(containerId);
            const daysInMonth = 30;
            const firstDay = 3; 

            let html = `<div class="grid grid-cols-7 gap-1 text-center font-bold ${isSmall ? 'mb-1 text-[7px]' : 'mb-2 text-xs'} text-gray-500">`;
            html += `<div>S</div><div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div></div>`;
            
            html += `<div class="grid grid-cols-7 gap-1 text-center ${isSmall ? 'text-[8px] gap-y-1' : 'text-sm gap-y-3'}">`;
            
            for (let i = 0; i < firstDay; i++) { html += `<div></div>`; }
            
            for (let d = 1; d <= daysInMonth; d++) {
                if (d === 20) {
                    html += `<div class="bg-red-600 text-white rounded-sm outline outline-1 outline-offset-1 outline-red-600 relative group cursor-pointer">
                                ${d}
                                ${!isSmall ? '<span class="absolute -top-7 left-1/2 -translate-x-1/2 bg-white text-black text-[10px] px-2 py-1 rounded opacity-0 group-hover:opacity-100 whitespace-nowrap transition-opacity shadow-lg z-20">🚀 Starship 發射日</span>' : ''}
                             </div>`;
                } else {
                    html += `<div>${d}</div>`;
                }
            }
            html += `</div>`;
            container.innerHTML = html;
        }

        renderCalendar('calendar-2d', false);
        renderCalendar('calendar-ar', true);

        // --- AR 狀態切換邏輯 ---
        const btnEnterAR = document.getElementById('btn-enter-ar');
        const uiLayer = document.getElementById('ui-layer');
        const arHud = document.getElementById('ar-hud');
        const sceneContainer = document.getElementById('ar-scene-container');
        const sceneEl = document.querySelector('a-scene');

        btnEnterAR.addEventListener('click', function () {
            // 取消隱藏，讓 A-Frame 可以正常運作並接收事件
            sceneContainer.style.opacity = '1';
            sceneContainer.style.pointerEvents = 'auto';

            if (sceneEl.hasLoaded) {
                sceneEl.enterVR(true);
            } else {
                sceneEl.addEventListener('loaded', () => sceneEl.enterVR(true));
            }
        });

        sceneEl.addEventListener('enter-vr', function () {
            uiLayer.style.display = 'none'; // 隱藏 2D 介面與 Iframe
            arHud.style.display = 'block';  // 顯示 AR 左上角月曆
        });

        sceneEl.addEventListener('exit-vr', function () {
            uiLayer.style.display = 'flex'; // 恢復 2D 介面
            arHud.style.display = 'none';   
            
            // 恢復隱藏 3D 場景
            sceneContainer.style.opacity = '0';
            sceneContainer.style.pointerEvents = 'none';
        });
    </script>
</body>
</html>
