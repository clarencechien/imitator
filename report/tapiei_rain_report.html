<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>路上有雨嗎</title>
<style>
  :root{
    --bg:#0f1622; --bg2:#15202f; --card:#1a2535; --line:#27344a;
    --txt:#e6edf6; --muted:#7e8cab; --dim:#56657f;
    --dry:#4fd1a5; --sky:#5aa9ff;
    /* 雨量分級色 */
    --i1:#7fa8c9; --i2:#5aa9ff; --i3:#f5c518; --i4:#f5821f; --i5:#ff4d4d;
    --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:var(--sans);
       -webkit-font-smoothing:antialiased;line-height:1.4}
  .wrap{max-width:460px;margin:0 auto;min-height:100vh;
        padding:max(20px,env(safe-area-inset-top)) 18px 30px;
        background:linear-gradient(180deg,#13202f 0%,var(--bg) 40%)}
  .top{display:flex;align-items:baseline;justify-content:space-between}
  .app{font-size:13px;color:var(--sky);letter-spacing:1px;font-weight:600}
  .mode{font-family:var(--mono);font-size:10px;color:var(--dim);
        border:1px solid var(--line);border-radius:3px;padding:2px 6px}
  .clock{font-size:34px;font-weight:700;letter-spacing:.5px;margin-top:6px}
  .fresh{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
  .fresh.stale{color:var(--i4)}
  .label{font-size:12px;color:var(--muted);letter-spacing:1px;
         margin:26px 0 10px;text-transform:uppercase}

  .points{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
  .pt{background:var(--card);border:1px solid var(--line);border-radius:12px;
      padding:14px 8px;text-align:center;position:relative;overflow:hidden}
  .pt .id{font-family:var(--mono);font-size:11px;color:var(--dim)}
  .pt .nm{font-size:12px;font-weight:600;margin:3px 0 8px;white-space:nowrap;
          overflow:hidden;text-overflow:ellipsis}
  .pt .st{font-size:15px;font-weight:700}
  .pt .mm{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px}
  .pt .bar{position:absolute;left:0;right:0;bottom:0;height:3px}

  .corridor{font-size:12px;color:var(--dim);margin:18px 0 8px;
            font-family:var(--mono);letter-spacing:.5px}
  .path{background:var(--card);border:1px solid var(--line);border-radius:14px;
        padding:14px 16px 12px;margin-bottom:10px}
  .path.alert{border-color:var(--line)}
  .phead{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
  .phead .arrow{color:var(--dim);font-weight:400}
  .phead .tag{margin-left:auto;font-size:11px;color:var(--dim);font-weight:600;
              border:1px solid var(--line);border-radius:10px;padding:2px 9px}
  .verdict{font-size:14px;margin:9px 0 12px;font-weight:600;color:var(--dry)}
  .verdict .big{font-size:19px}
  .verdict .hint{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-top:3px}

  .tl{position:relative;height:42px;margin-top:4px}
  .tl .track{position:absolute;top:18px;left:0;right:0;height:6px;
             background:var(--bg2);border-radius:3px;border:1px solid var(--line)}
  .tl .band{position:absolute;top:16px;height:10px;border-radius:5px}
  .tl .ends{position:absolute;top:-2px;width:100%;display:flex;
            justify-content:space-between;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .tl .ticks{position:absolute;top:28px;width:100%;display:flex;
             justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--dim)}
  .tl .clearmsg{position:absolute;top:11px;width:100%;text-align:center;
                font-size:12px;color:var(--dry);font-weight:600}
  .tl .flag{position:absolute;top:-4px;transform:translateX(-50%);
            font-family:var(--mono);font-size:10px;white-space:nowrap;font-weight:600}

  footer{margin-top:24px;font-size:11px;color:var(--dim);line-height:1.6}
  footer b{color:var(--muted);font-weight:600}
  .err{color:var(--i4);font-size:13px;margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <span class="app">路上有雨嗎</span>
    <span class="mode" id="mode">SHADOW · 參考</span>
  </div>
  <div class="clock" id="clock">—</div>
  <div class="fresh" id="fresh">載入中…</div>

  <div class="label">現在 · 各點雨勢</div>
  <div class="points" id="points"></div>

  <div class="label">通勤路徑 · 未來 60 分</div>
  <div id="paths"></div>

  <footer id="footer"></footer>
</div>

<script>
/* ---- data.json 契約（Cloudflare Worker cron 產出，寫入 R2） ----
{
  "updated_local":"2026-06-17 08:10", "source_age_min":2, "mode":"shadow",
  "points":[{"id":"A","name":"遠東世紀廣場","area":"中和","mm_hr":0}, ...],   // 用 mm/hr，不用 boolean
  "paths":[
    {"id":"B-A","from":"B","to":"A","tag":"上班","status":"clear"},
    {"id":"B-C","from":"B","to":"C","tag":"上班","status":"rain_ahead",
     "eta_min":18,"segment":"內湖段","peak_mm_hr":6,"window_min":[18,38],"confidence":"中"}
  ]
}
   status: clear | raining_now | rain_ahead
------------------------------------------------------ */

const MOCK = {
  updated_local:"2026-06-17 08:10", source_age_min:2, mode:"shadow",
  points:[
    {id:"A",name:"遠東世紀廣場",area:"中和",mm_hr:0},
    {id:"B",name:"頂溪站",area:"永和",mm_hr:1.2},
    {id:"C",name:"瑞光智慧社區",area:"內湖內科",mm_hr:14}
  ],
  paths:[
    {id:"B-A",from:"B",to:"A",tag:"上班",status:"clear"},
    {id:"A-B",from:"A",to:"B",tag:"下班",status:"clear"},
    {id:"B-C",from:"B",to:"C",tag:"上班",status:"rain_ahead",
     eta_min:18,segment:"內湖段",peak_mm_hr:6,window_min:[18,38],confidence:"中"},
    {id:"C-B",from:"C",to:"B",tag:"下班",status:"raining_now",
     segment:"內科起點",peak_mm_hr:14,window_min:[0,25],confidence:"高"}
  ]
};

const HORIZON=60;
const pct=m=>Math.max(0,Math.min(100,(m/HORIZON)*100));
function classify(mm){
  if(mm==null||mm<=0) return {t:0,label:"無雨",c:"var(--dim)"};
  if(mm<1)  return {t:1,label:"毛毛雨",c:"var(--i1)"};
  if(mm<4)  return {t:2,label:"小雨",c:"var(--i2)"};
  if(mm<10) return {t:3,label:"中雨",c:"var(--i3)"};
  if(mm<30) return {t:4,label:"大雨",c:"var(--i4)"};
  return {t:5,label:"豪雨",c:"var(--i5)"};
}
function decisionHint(t){
  if(t>=5) return "豪雨，建議改大眾運輸或等雨勢";
  if(t>=4) return "大雨，建議等 10–15 分再出發";
  if(t>=3) return "中雨，記得帶傘/雨衣";
  if(t>=2) return "小雨，可直接出發";
  if(t>=1) return "毛毛雨，影響不大";
  return "";
}

function render(d){
  document.getElementById("clock").textContent = (d.updated_local||"").split(" ")[1] || "—";
  const age=d.source_age_min;
  const fresh=document.getElementById("fresh");
  fresh.textContent = `資料 ${age} 分前 · ${d.updated_local||""}`;
  fresh.className = "fresh"+(age>=10?" stale":"");
  document.getElementById("mode").textContent = (d.mode==="shadow"?"SHADOW · 參考":"LIVE");

  // points
  document.getElementById("points").innerHTML = d.points.map(p=>{
    const k=classify(p.mm_hr);
    return `<div class="pt" style="border-color:${k.t?k.c:'var(--line)'}">
      <div class="id">${p.id}</div>
      <div class="nm">${p.area||p.name}</div>
      <div class="st" style="color:${k.c}">${k.label}</div>
      <div class="mm">${p.mm_hr>0?p.mm_hr+" mm/hr":"—"}</div>
      <div class="bar" style="background:${k.t?k.c:'var(--dim)'}"></div></div>`;
  }).join("");

  // group paths by corridor (sorted endpoints)
  const groups={};
  d.paths.forEach(p=>{const key=[p.from,p.to].sort().join("–");(groups[key]=groups[key]||[]).push(p);});
  const area={}; d.points.forEach(p=>area[p.id]=p.area||p.name);

  let html="";
  Object.entries(groups).forEach(([key,paths])=>{
    const [x,y]=key.split("–");
    html+=`<div class="corridor">走廊 ${x}–${y} · ${area[x]} ↔ ${area[y]}</div>`;
    paths.forEach(p=>{
      const k=classify(p.peak_mm_hr);
      let cls="",vtxt,band="",flag="",clearmsg="",hint="";
      if(p.status==="clear"){
        vtxt=`<span class="big" style="color:var(--dry)">整段無雨</span>`;
        clearmsg=`<div class="clearmsg">— 60 分內無雨 —</div>`;
      }else if(p.status==="raining_now"){
        cls="alert";
        vtxt=`出發就遇 <span class="big" style="color:${k.c}">${k.label}</span>`;
        const w=p.window_min||[0,25];
        band=`<div class="band" style="left:0;width:${pct(w[1])}%;background:${k.c}"></div>`;
        flag=`<div class="flag" style="left:2%;color:${k.c}">現在</div>`;
        hint=`<span class="hint">${decisionHint(k.t)}</span>`;
      }else{ // rain_ahead
        cls="alert";
        vtxt=`約 <span class="big" style="color:${k.c}">${p.eta_min} 分</span>後在 <b>${p.segment||"途中"}</b> 遇 <span style="color:${k.c}">${k.label}</span>`;
        const w=p.window_min||[p.eta_min,p.eta_min+15];
        band=`<div class="band" style="left:${pct(w[0])}%;width:${Math.max(4,pct(w[1])-pct(w[0]))}%;background:${k.c}"></div>`;
        flag=`<div class="flag" style="left:${pct(p.eta_min)}%;color:${k.c}">+${p.eta_min}m</div>`;
        hint=`<span class="hint">${decisionHint(k.t)}</span>`;
      }
      html+=`<div class="path ${cls}" ${cls?`style="border-color:${k.c}"`:""}>
        <div class="phead">${p.from} <span class="arrow">──→</span> ${p.to}
          ${p.tag?`<span class="tag">${p.tag}</span>`:""}</div>
        <div class="verdict">${vtxt}${p.confidence?` <span style="color:var(--dim);font-size:12px;font-weight:500">· 信心 ${p.confidence}</span>`:""}${hint}</div>
        <div class="tl">
          <div class="ends"><span>${p.from}</span><span>${p.to}</span></div>
          <div class="track"></div>${band}${clearmsg}${flag}
          <div class="ticks"><span>現在</span><span>+15</span><span>+30</span><span>+45</span><span>+60</span></div>
        </div>
      </div>`;
    });
  });
  document.getElementById("paths").innerHTML = html;

  document.getElementById("footer").innerHTML =
    `資料源：<b>中央氣象署</b> 雷達回波 / 自動雨量站。強度採 mm/hr 分級（小雨→豪雨）。<br>`+
    `更新由 Cloudflare Worker cron 每 1–5 分鐘排程、寫入 R2，<b>僅供參考、非即時警報</b>。`;
}

(async function(){
  try{
    const r = await fetch("data.json",{cache:"no-store"});
    if(!r.ok) throw new Error("no data.json");
    render(await r.json());
  }catch(e){
    render(MOCK);
    document.getElementById("footer").innerHTML +=
      `<div class="err">（目前為內嵌示範資料：找不到 data.json，部署後由 Worker 產生即接上。）</div>`;
  }
})();
</script>
</body>
</html>
