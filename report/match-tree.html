<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Match-3 Architecture: Scanner & Validation</title>
    <style>
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 30px; 
        }
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }
        button {
            background: #333; color: #fff; border: 1px solid #555; padding: 10px 15px; cursor: pointer; font-size: 16px;
        }
        button:hover { background: #444; }
        button:disabled { background: #222; color: #555; cursor: not-allowed; }
        #stats { margin-bottom: 20px; font-size: 20px; font-weight: bold; }
        #log { color: #aaa; margin-bottom: 10px; height: 24px; font-size: 14px; }
        #board { display: grid; gap: 2px; background: #333; padding: 2px; border: 2px solid #555; }
        .cell {
            width: 50px; height: 50px; display: flex; justify-content: center; align-items: center;
            font-size: 24px; background-color: #222; transition: all 0.2s ease-in-out; cursor: pointer; user-select: none;
            box-sizing: border-box; /* 確保邊框不會擠壓版面 */
        }
        .cell:hover { background-color: #3a3a3a; }
        /* 狀態機 UI 表現 */
        .cell.selected { border: 3px solid #4CAF50; transform: scale(1.1); z-index: 10; }
        .cell.matched { transform: scale(0); opacity: 0; }
        .cell.error { border: 3px solid #F44336; }
        .cell.hint { border: 3px dashed #FFEB3B; }
    </style>
</head>
<body>

    <div class="controls">
        <button id="btn-hint" onclick="showHint()">啟動掃描器 (Hint)</button>
        <button id="btn-reset" onclick="initStableBoard()">強制洗牌 (Shuffle)</button>
    </div>

    <div id="stats">Combo: <span id="combo-count" style="color: #4CAF50;">0</span></div>
    <div id="log">系統就緒。請點擊相鄰方塊進行交換。</div>
    <div id="board"></div>

<script>
    // --- 系統參數配置 ---
    const ROWS = 8;
    const COLS = 8;
    const TYPES = ['🔴', '🔵', '🟢', '🟡', '🟣']; 
    const SLEEP_MS = 250; // 動畫等待時間 (毫秒)

    // --- 資料層狀態 ---
    let boardData = []; 
    let isProcessing = false;
    let selectedCoords = null; 

    // --- DOM 節點快取 ---
    const boardEl = document.getElementById('board');
    const comboEl = document.getElementById('combo-count');
    const logEl = document.getElementById('log');
    const btnHint = document.getElementById('btn-hint');

    boardEl.style.gridTemplateColumns = `repeat(${COLS}, 50px)`;
    boardEl.style.gridTemplateRows = `repeat(${ROWS}, 50px)`;

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));
    const setLog = (msg) => logEl.textContent = msg;

    // --- 初始化：強制生成無連線的穩定態陣列 ---
    function initStableBoard() {
        if(isProcessing) return;
        boardData = [];
        boardEl.innerHTML = '';
        selectedCoords = null;
        comboEl.textContent = "0";

        for (let r = 0; r < ROWS; r++) {
            let row = [];
            for (let c = 0; c < COLS; c++) {
                let type;
                // 防呆驗證：阻斷 L 型與一字型的初始生成
                do {
                    type = TYPES[Math.floor(Math.random() * TYPES.length)];
                } while (
                    (c >= 2 && type === row[c-1] && type === row[c-2]) ||
                    (r >= 2 && type === boardData[r-1][c] && type === boardData[r-2][c])
                );
                row.push(type);

                const cell = document.createElement('div');
                cell.id = `cell-${r}-${c}`;
                cell.className = 'cell';
                cell.onclick = () => handlePlayerClick(r, c);
                boardEl.appendChild(cell);
            }
            boardData.push(row);
        }
        render();
        setLog('盤面已重置，系統就緒。');
    }

    // --- 渲染引擎：資料映射至 UI ---
    function render() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                const cell = document.getElementById(`cell-${r}-${c}`);
                const val = boardData[r][c];
                cell.textContent = val || '';
                cell.style.backgroundColor = val ? '#2a2a2a' : '#111';
                // 清除所有狀態標記
                cell.classList.remove('matched', 'selected', 'error', 'hint');
            }
        }
        // 若有選取目標，重新補上選取框
        if (selectedCoords) {
            document.getElementById(`cell-${selectedCoords.r}-${selectedCoords.c}`).classList.add('selected');
        }
    }

    // --- 掃描引擎：回傳可消除的座標 Set ---
    function scanMatches() {
        let matchedSet = new Set();
        // 水平掃描
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS - 2; c++) {
                let v1 = boardData[r][c], v2 = boardData[r][c+1], v3 = boardData[r][c+2];
                if (v1 && v1 === v2 && v1 === v3) {
                    matchedSet.add(`${r},${c}`); 
                    matchedSet.add(`${r},${c+1}`); 
                    matchedSet.add(`${r},${c+2}`);
                }
            }
        }
        // 垂直掃描
        for (let r = 0; r < ROWS - 2; r++) {
            for (let c = 0; c < COLS; c++) {
                let v1 = boardData[r][c], v2 = boardData[r+1][c], v3 = boardData[r+2][c];
                if (v1 && v1 === v2 && v1 === v3) {
                    matchedSet.add(`${r},${c}`); 
                    matchedSet.add(`${r+1},${c}`); 
                    matchedSet.add(`${r+2},${c}`);
                }
            }
        }
        return matchedSet;
    }

    // --- 玩家輸入控制與合法性驗證 ---
    async function handlePlayerClick(r, c) {
        if (isProcessing) return;

        // 第一次點擊
        if (!selectedCoords) {
            selectedCoords = { r, c };
            render();
            setLog(`已鎖定 (${r}, ${c})，等待目標座標...`);
            return;
        }

        // 點擊原方塊取消
        if (selectedCoords.r === r && selectedCoords.c === c) {
            selectedCoords = null;
            render();
            setLog('取消選取。');
            return;
        }

        // 檢查相鄰限制 (Manhattan Distance === 1)
        const isAdjacent = Math.abs(selectedCoords.r - r) + Math.abs(selectedCoords.c - c) === 1;
        if (!isAdjacent) {
            setLog('架構阻擋：交換目標必須相鄰。');
            selectedCoords = null;
            render();
            return;
        }

        // 鎖定系統狀態，準備驗證
        isProcessing = true;
        btnHint.disabled = true;
        comboEl.textContent = "0";
        const r1 = selectedCoords.r, c1 = selectedCoords.c;
        const r2 = r, c2 = c;
        
        // 1. 記憶體層交換
        swapData(r1, c1, r2, c2);
        selectedCoords = null;
        render();
        setLog('驗證 Transaction...');
        await sleep(150);

        // 2. 驗證
        const initialMatches = scanMatches();

        if (initialMatches.size === 0) {
            // 驗證失敗：Rollback
            setLog('無效移動：未產生消除，觸發 Rollback。');
            document.getElementById(`cell-${r1}-${c1}`).classList.add('error');
            document.getElementById(`cell-${r2}-${c2}`).classList.add('error');
            await sleep(300);

            swapData(r1, c1, r2, c2); // 換回原資料
            render();
            isProcessing = false;
            btnHint.disabled = false;
            setLog('系統就緒。');
            return;
        }

        // 3. 驗證通過：進入 Combo 迴圈
        setLog('驗證通過，啟動 Cascade 解析。');
        await resolveCascade();
    }

    // --- 物理引擎：重力雙指標掃描 ---
    function applyGravity() {
        for (let c = 0; c < COLS; c++) {
            let writeIdx = ROWS - 1;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (boardData[r][c] !== null) {
                    boardData[writeIdx][c] = boardData[r][c];
                    writeIdx--;
                }
            }
            while (writeIdx >= 0) { 
                boardData[writeIdx][c] = null; 
                writeIdx--; 
            }
        }
    }

    // --- 隨機補齊 ---
    function refillBoard() {
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (boardData[r][c] === null) {
                    boardData[r][c] = TYPES[Math.floor(Math.random() * TYPES.length)];
                }
            }
        }
    }

    // --- 核心迴圈 (Cascade Resolution Loop) ---
    async function resolveCascade() {
        let combo = 0;
        let hasMatch = true;

        while (hasMatch) {
            let matches = scanMatches();
            
            if (matches.size === 0) {
                hasMatch = false;
                break;
            }

            combo++;
            comboEl.textContent = combo;
            
            // 資料層清空與 UI 播放
            matches.forEach(coord => {
                const [r, c] = coord.split(',').map(Number);
                document.getElementById(`cell-${r}-${c}`).classList.add('matched');
                boardData[r][c] = null;
            });

            await sleep(SLEEP_MS);
            applyGravity();
            render(); 
            await sleep(SLEEP_MS);
            refillBoard();
            render();
            await sleep(SLEEP_MS); 
        }
        
        isProcessing = false;
        btnHint.disabled = false;
        setLog('系統就緒。');
    }

    // --- 輔助函式：純資料層交換 ---
    function swapData(r1, c1, r2, c2) {
        let temp = boardData[r1][c1];
        boardData[r1][c1] = boardData[r2][c2];
        boardData[r2][c2] = temp;
    }

    // ==========================================
    // 預測與分析模組 (Scanner / Hint Generator)
    // ==========================================
    function showHint() {
        if (isProcessing) return;
        
        // 每次掃描前先清除舊的高亮 UI
        render(); 
        
        let validMoves = [];

        // 窮舉掃描
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                
                // 向右模擬 (確保不越界)
                if (c < COLS - 1) {
                    swapData(r, c, r, c + 1);
                    if (scanMatches().size > 0) validMoves.push({r1: r, c1: c, r2: r, c2: c + 1});
                    swapData(r, c, r, c + 1); // 立即 Rollback
                }
                
                // 向下模擬 (確保不越界)
                if (r < ROWS - 1) {
                    swapData(r, c, r + 1, c);
                    if (scanMatches().size > 0) validMoves.push({r1: r, c1: c, r2: r + 1, c2: c});
                    swapData(r, c, r + 1, c); // 立即 Rollback
                }
            }
        }

        if (validMoves.length > 0) {
            // 隨機挑出一個解來高亮
            const hint = validMoves[Math.floor(Math.random() * validMoves.length)];
            document.getElementById(`cell-${hint.r1}-${hint.c1}`).classList.add('hint');
            document.getElementById(`cell-${hint.r2}-${hint.c2}`).classList.add('hint');
            setLog(`背景掃描完成：找到 ${validMoves.length} 組可行移動，已標記一組。`);
        } else {
            // 死鎖預判
            setLog('⚠️ 警告：盤面死鎖 (Deadlock)，無任何可行移動！請點擊強制洗牌。');
        }
    }

    // --- Boot ---
    initStableBoard();
</script>
</body>
</html>
