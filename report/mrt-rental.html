  const lo=isF?12000:7000, hi=isF?58000:24000;
  const t=Math.max(0,Math.min(1,(a-lo)/(hi-lo)));
  // teal→green→yellow→orange→red
  if(t<.25){const s=t/.25;return `rgb(${Math.round(13+40*s)},${Math.round(148+63*s)},${Math.round(136-8*s)})`}
  if(t<.5){const s=(t-.25)/.25;return `rgb(${Math.round(53+110*s)},${Math.round(211-11*s)},${Math.round(128-93*s)})`}
  if(t<.75){const s=(t-.5)/.25;return `rgb(${Math.round(163+86*s)},${Math.round(200-77*s)},${Math.round(35-20*s)})`}
  const s=(t-.75)/.25;return `rgb(${Math.round(249+6*s)},${Math.round(123-60*s)},${Math.round(15-15*s)})`
}
 
function renderMap(){
  const svg=document.getElementById('mapSvg');
  let h=`<defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0L0 0 0 40" fill="none" stroke="rgba(255,255,255,.015)" stroke-width="1"/></pattern></defs><rect width="1380" height="920" fill="url(#g)"/>`;
  // Lines
  const lineMap={red:'red',blue:'blue',green:'green',orange_m:'orange',orange_l:'orange',brown:'brown',yellow:'yellow',wanda:'wanda',sanying:'sanying',ankeng:'ankeng',danhai:'danhai'};
  const order=['yellow','wanda','sanying','ankeng','danhai','blue','red','green','orange_m','orange_l','brown'];
  order.forEach(k=>{
    const pts=MP[k];if(!pts)return;
    const lk=lineMap[k];const L=LINES[lk];if(!L)return;
    h+=`<polyline points="${pts.map(p=>p.join(',')).join(' ')}" fill="none" stroke="${L.color}" stroke-width="4.5" stroke-opacity=".3" stroke-linecap="round" stroke-linejoin="round"/>`;
  });
  // Stations
  const drawn=new Set();
  const allS=[];
  order.forEach(k=>{
    const pts=MP[k],names=MN[k];if(!pts||!names)return;
    pts.forEach((p,i)=>{
      const nm=names[i];if(!nm)return;
      const key=p[0]+','+p[1];
      if(drawn.has(key))return;drawn.add(key);
      allS.push({name:nm,x:p[0],y:p[1]});
    });
  });
  allS.forEach(s=>{
    const col=heatCol(s.name);
    const isTr=TRANSFERS.has(s.name);
    const r=isTr?6.5:4;
    h+=`<circle cx="${s.x}" cy="${s.y}" r="${r}" fill="${col}" stroke="rgba(0,0,0,.55)" stroke-width="1.5" data-name="${s.name}" style="cursor:pointer"/>`;
    if(isTr){
      const lbl=s.name.length>5?s.name.slice(0,4)+'…':s.name;
      // offset labels to avoid overlap
      let tx=s.x,ty=s.y-11,anchor='middle';
      h+=`<text x="${tx}" y="${ty}" text-anchor="${anchor}" fill="#b0bec5" font-size="7.5" font-weight="500" font-family="'Noto Sans TC',sans-serif" pointer-events="none" opacity=".85">${lbl}</text>`;
    }
  });
  h+=`<text x="1340" y="32" text-anchor="end" fill="rgba(255,255,255,.06)" font-size="52" font-weight="900" font-family="'JetBrains Mono',monospace">MRT</text>`;
  h+=`<text x="22" y="905" fill="rgba(255,255,255,.12)" font-size="9" font-family="'Noto Sans TC',sans-serif">↑北(淡水/北投)　→東(內湖/南港)　↓南(新店/三峽/鶯歌)　←西(板橋/土城)</text>`;
  svg.innerHTML=h;
  // Events
  const tt=document.getElementById('mapTooltip'),wrap=document.getElementById('mapWrap');
  svg.querySelectorAll('circle[data-name]').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      const nm=el.dataset.name,d=sLookup[nm];if(!d)return;
      el.setAttribute('r',parseFloat(el.getAttribute('r'))+3);
      const L=LINES[d.line];
      tt.innerHTML=`<div class="tt-s">${d.station}</div><div class="tt-l" style="color:${L.color}">${L.name}｜${d.dist}</div><hr style="border:none;border-top:1px solid var(--border);margin:5px 0"><div style="font-size:9px;color:var(--text2);margin-bottom:3px">套房 8-12坪</div><div class="tt-r"><span class="tt-k">舊公寓</span><span class="tt-v">$${d.studio_old[0].toLocaleString()}~${d.studio_old[1].toLocaleString()}</span></div><div class="tt-r"><span class="tt-k">新大樓</span><span class="tt-v">$${d.studio_new[0].toLocaleString()}~${d.studio_new[1].toLocaleString()}</span></div><div style="font-size:9px;color:var(--text2);margin:5px 0 3px">三房 28-38坪</div><div class="tt-r"><span class="tt-k">舊公寓</span><span class="tt-v">$${d.family_old[0].toLocaleString()}~${d.family_old[1].toLocaleString()}</span></div><div class="tt-r"><span class="tt-k">新大樓</span><span class="tt-v">$${d.family_new[0].toLocaleString()}~${d.family_new[1].toLocaleString()}</span></div>`;
      tt.style.display='block';
    });
    el.addEventListener('mousemove',e=>{
      const r=wrap.getBoundingClientRect();
      let lf=e.clientX-r.left+wrap.scrollLeft+15,tp=e.clientY-r.top+wrap.scrollTop-10;
      if(lf+210>wrap.scrollLeft+r.width)lf-=230;
      tt.style.left=lf+'px';tt.style.top=tp+'px';
    });
    el.addEventListener('mouseleave',()=>{
      el.setAttribute('r',TRANSFERS.has(el.dataset.name)?6.5:4);
      tt.style.display='none';
    });
  });
}
document.getElementById('mapTypeToggle').addEventListener('click',e=>{if(!e.target.classList.contains('mt-btn'))return;document.querySelectorAll('.mt-btn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');mapPK=e.target.dataset.mt;document.getElementById('mapModeLabel').textContent={studio_new:'套房新大樓 月租',studio_old:'套房舊公寓 月租',family_new:'三房新大樓 月租',family_old:'三房舊公寓 月租'}[mapPK];renderMap()});
 
// ═══ TABLE ═══
let curLine='all',curType='studio',curSort='line',curSearch='';
(function(){document.getElementById('legendArea').innerHTML=Object.entries(LINES).map(([k,v])=>`<span class="ldot"><i style="background:${v.color}"></i>${v.name}</span>`).join('');let f=`<button class="fbtn active" data-line="all">全部</button>`;for(const[k,v] of Object.entries(LINES))f+=`<button class="fbtn" data-line="${k}"><span class="dot" style="background:${v.color}"></span>${v.name}</button>`;document.getElementById('lineFilters').innerHTML=f})();
function getF(){let d=DATA;if(curLine!=='all')d=d.filter(x=>x.line===curLine);if(curSearch){const s=curSearch.toLowerCase();d=d.filter(x=>x.station.toLowerCase().includes(s)||x.dist.toLowerCase().includes(s))}const pf=x=>{const p=curType==='studio'?x.studio_new:x.family_new;return(p[0]+p[1])/2};if(curSort==='price_asc')d=[...d].sort((a,b)=>pf(a)-pf(b));else if(curSort==='price_desc')d=[...d].sort((a,b)=>pf(b)-pf(a));else if(curSort==='heat')d=[...d].sort((a,b)=>b.heat-a.heat);return d}
function fmt(n){return n.toLocaleString()}function avg(a){return(a[0]+a[1])/2}
function pC(v,t){if(t==='studio')return v>15000?'ph':v>11000?'pm':'pl';return v>38000?'ph':v>26000?'pm':'pl'}
function hD(n){return'●'.repeat(n)+'<span style="opacity:.15">●</span>'.repeat(5-n)}
function rStats(){const d=getF(),n=d.length;if(!n){document.getElementById('statsRow').innerHTML='';return}const a=k=>d.reduce((s,x)=>s+avg(x[k]),0)/n;document.getElementById('statsRow').innerHTML=`<div class="sc s1"><div class="sc-l">顯示站數</div><div class="sc-v">${n}</div><div class="sc-n">/${DATA.length}站</div></div><div class="sc s2"><div class="sc-l">套房舊公寓</div><div class="sc-v">$${fmt(Math.round(a('studio_old')/100)*100)}</div></div><div class="sc s3"><div class="sc-l">套房新大樓</div><div class="sc-v">$${fmt(Math.round(a('studio_new')/100)*100)}</div></div><div class="sc s4"><div class="sc-l">三房舊公寓</div><div class="sc-v">$${fmt(Math.round(a('family_old')/100)*100)}</div></div><div class="sc s5"><div class="sc-l">三房新大樓</div><div class="sc-v">$${fmt(Math.round(a('family_new')/100)*100)}</div></div>`}
function rTable(){const data=getF();const mx=curType==='studio'?27000:66000;let h='';data.forEach(d=>{const old=curType==='studio'?d.studio_old:d.family_old;const nw=curType==='studio'?d.studio_new:d.family_new;const L=LINES[d.line];const bS=(old[0]/mx*100).toFixed(0),bE=(nw[1]/mx*100).toFixed(0);h+=`<tr><td><span class="lb" style="background:${L.color}">${L.short}</span></td><td class="sn">${d.station}</td><td style="color:var(--text2);font-size:10px">${d.dist}</td><td class="pc ${pC(avg(old),curType)}">$${fmt(old[0])}~${fmt(old[1])}</td><td class="pc ${pC(avg(nw),curType)}">$${fmt(nw[0])}~${fmt(nw[1])}</td><td><div class="bar-bg"><div class="bar-fill" style="left:${bS}%;width:${bE-bS}%;background:linear-gradient(90deg,${L.color}66,${L.color})"></div></div></td><td class="heat">${hD(d.heat)}</td></tr>`});document.getElementById('mainTable').innerHTML=h;document.getElementById('countLabel').textContent=`${data.length}/${DATA.length}站`}
function hmC(v){if(v>40000)return'rgba(251,113,133,.7)';if(v>30000)return'rgba(251,113,133,.45)';if(v>22000)return'rgba(251,191,36,.45)';if(v>16000)return'rgba(251,191,36,.28)';if(v>11000)return'rgba(52,211,153,.3)';return'rgba(52,211,153,.15)'}
function rHM(){const lks=Object.keys(LINES);const cs=[{l:'套房舊公寓',k:'studio_old'},{l:'套房新大樓',k:'studio_new'},{l:'三房舊公寓',k:'family_old'},{l:'三房新大樓',k:'family_new'}];let h='<div class="hm-h"></div>';cs.forEach(c=>h+=`<div class="hm-h">${c.l}</div>`);lks.forEach(ln=>{const ld=DATA.filter(d=>d.line===ln),L=LINES[ln];h+=`<div class="hm-l"><span class="lb" style="background:${L.color};font-size:7px">${L.short}</span>${L.name}</div>`;cs.forEach(c=>{const vs=ld.map(d=>avg(d[c.k]));const a=vs.reduce((s,v)=>s+v,0)/vs.length;const lo=Math.min(...ld.map(d=>d[c.k][0])),hi=Math.max(...ld.map(d=>d[c.k][1]));h+=`<div class="hm-c" style="background:${hmC(a)}">${fmt(Math.round(a/100)*100)}<small>${fmt(lo)}~${fmt(hi)}</small></div>`})});document.getElementById('heatmapGrid').innerHTML=h}
function render(){rStats();rTable()}
document.getElementById('lineFilters').addEventListener('click',e=>{const b=e.target.closest('.fbtn');if(!b)return;document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curLine=b.dataset.line;render()});
document.getElementById('typeToggle').addEventListener('click',e=>{if(!e.target.classList.contains('tbtn'))return;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');curType=e.target.dataset.type;render()});
document.getElementById('sortSelect').addEventListener('change',e=>{curSort=e.target.value;render()});
document.getElementById('searchBox').addEventListener('input',e=>{curSearch=e.target.value.trim();render()});
render();rHM();renderMap();
</script>
