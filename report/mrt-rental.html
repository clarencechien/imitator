{k:'yellow',d:_yellow},{k:'wanda',d:_wanda},{k:'sanying',d:_sanying},{k:'ankeng',d:_ankeng},{k:'danhai',d:_danhai},
{k:'blue',d:_blue},{k:'red',d:_red},{k:'green',d:_green},{k:'orange',d:_or_m},{k:'orange',d:_or_l},{k:'brown',d:_brown}
];
 
const TRANSFERS=new Set(['台北車站','西門','中山','忠孝新生','忠孝復興','南京復興','松江南京','民權西路','東門','古亭','中正紀念堂','大安','大坪林','景安','板橋','南港展覽館','大橋頭','紅樹林','頂埔','頭前庄','市政府','府中','北投','新埔民生','十四張']);
 
// Station labels with position offsets [dx, dy, anchor]
const LABELS={
'台北車站':[-2,-14,'middle'],'西門':[-30,4,'end'],'中山':[0,-12,'middle'],'忠孝復興':[0,-14,'middle'],
'南京復興':[0,-12,'middle'],'松江南京':[0,-12,'middle'],'民權西路':[-5,-12,'end'],'東門':[8,4,'start'],
'古亭':[-10,4,'end'],'中正紀念堂':[-8,-10,'end'],'大安':[8,4,'start'],'板橋':[-10,4,'end'],
'景安':[-10,4,'end'],'大坪林':[10,4,'start'],'南港展覽館':[0,-12,'middle'],'大橋頭':[-5,-12,'end'],
'淡水':[0,-10,'middle'],'象山':[8,4,'start'],'松山':[8,4,'start'],'新店':[8,4,'start'],
'南勢角':[8,4,'start'],'迴龍':[-5,-10,'end'],'蘆洲':[-5,-10,'end'],'動物園':[0,14,'middle'],
'頂埔':[-8,4,'end'],'鶯桃福德':[-8,4,'end'],'雙城':[8,4,'start'],'淡海新市鎮':[0,14,'middle'],
'北投':[-5,-10,'end'],'市政府':[0,-12,'middle'],'台北101':[8,-4,'start'],'信義安和':[0,-12,'middle'],
'忠孝新生':[0,-12,'middle'],'忠孝敦化':[0,-12,'middle'],'府中':[-8,4,'end'],'紅樹林':[0,14,'middle'],
'頭前庄':[-8,4,'end'],'新埔民生':[-8,4,'end'],'十四張':[8,4,'start'],
};
 
let mapPK='studio_new';
 
function heatCol(name){
  const d=sLU[name];if(!d)return'#2a2a3a';
  const p=d[mapPK],a=(p[0]+p[1])/2;
  const isF=mapPK.startsWith('family');
  const lo=isF?12000:7000,hi=isF?58000:24000;
  const t=Math.max(0,Math.min(1,(a-lo)/(hi-lo)));
  if(t<.25){const s=t/.25;return`rgb(${13+42*s|0},${148+63*s|0},${136-8*s|0})`}
  if(t<.5){const s=(t-.25)/.25;return`rgb(${55+115*s|0},${211-16*s|0},${128-93*s|0})`}
  if(t<.75){const s=(t-.5)/.25;return`rgb(${170+80*s|0},${195-72*s|0},${35-20*s|0})`}
  const s=(t-.75)/.25;return`rgb(${250+5*s|0},${123-58*s|0},${15-15*s|0})`
}
 
function renderMap(){
  const svg=document.getElementById('mapSvg');
  let h=`<defs><pattern id="cg" width="50" height="50" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r=".5" fill="rgba(255,255,255,.03)"/></pattern></defs><rect x="40" y="25" width="1130" height="1130" fill="url(#cg)"/>`;
 
  // Draw concentric reference rings (very subtle)
  [180,310,440].forEach(r=>{
    h+=`<circle cx="590" cy="520" r="${r}" fill="none" stroke="rgba(255,255,255,.015)" stroke-width="1"/>`;
  });
 
  // Draw line paths
  ALL_LINES.forEach(({k,d})=>{
    const L=LINES[k];if(!L)return;
    const pts=d.pts.map(p=>p.join(',')).join(' ');
    h+=`<polyline points="${pts}" fill="none" stroke="${L.color}" stroke-width="5" stroke-opacity=".28" stroke-linecap="round" stroke-linejoin="round"/>`;
  });
 
  // Collect all station positions (deduplicate by name)
  const stMap=new Map();
  ALL_LINES.forEach(({d})=>{
    d.nms.forEach((nm,i)=>{
      if(nm && !stMap.has(nm)) stMap.set(nm, d.pts[i]);
    });
  });
 
  // Draw station dots
  stMap.forEach((pos,name)=>{
    const col=heatCol(name);
    const isTr=TRANSFERS.has(name);
    const r=isTr?7:4.2;
    h+=`<circle cx="${pos[0]}" cy="${pos[1]}" r="${r}" fill="${col}" stroke="rgba(0,0,0,.5)" stroke-width="${isTr?2:1.2}" data-name="${name}" style="cursor:pointer"/>`;
    // Labels
    const lb=LABELS[name];
    if(lb){
      const[dx,dy,anc]=lb;
      const short=name.length>6?name.slice(0,5)+'…':name;
      h+=`<text x="${pos[0]+dx}" y="${pos[1]+dy}" text-anchor="${anc}" fill="#b0bec5" font-size="8" font-weight="500" font-family="'Noto Sans TC',sans-serif" pointer-events="none" opacity=".82">${short}</text>`;
    }
  });
 
  // Compass text
  h+=`<text x="1120" y="52" text-anchor="end" fill="rgba(255,255,255,.05)" font-size="42" font-weight="900" font-family="'JetBrains Mono',monospace">MRT</text>`;
  h+=`<text x="70" y="1135" fill="rgba(255,255,255,.1)" font-size="8" font-family="'Noto Sans TC',sans-serif">同心圓版路網　●站點顏色=租金熱力　hover查看詳情</text>`;
 
  svg.innerHTML=h;
 
  // Tooltip events
  const tt=document.getElementById('mapTooltip'),wrap=document.getElementById('mapWrap');
  svg.querySelectorAll('circle[data-name]').forEach(el=>{
    el.addEventListener('mouseenter',()=>{
      const nm=el.dataset.name,d=sLU[nm];if(!d)return;
      el.setAttribute('r',parseFloat(el.getAttribute('r'))+3.5);
      const L=LINES[d.line];
      tt.innerHTML=`<div class="tt-s">${d.station}</div><div class="tt-l" style="color:${L.color}">● ${L.name}｜${d.dist}</div><hr style="border:none;border-top:1px solid rgba(255,255,255,.08);margin:6px 0"><div style="font-size:9px;color:var(--text2);margin-bottom:3px">套房 8-12坪 月租</div><div class="tt-r"><span class="tt-k">舊公寓</span><span class="tt-v">$${d.studio_old[0].toLocaleString()}~${d.studio_old[1].toLocaleString()}</span></div><div class="tt-r"><span class="tt-k">新大樓</span><span class="tt-v">$${d.studio_new[0].toLocaleString()}~${d.studio_new[1].toLocaleString()}</span></div><div style="font-size:9px;color:var(--text2);margin:5px 0 3px">三房 28-38坪 月租</div><div class="tt-r"><span class="tt-k">舊公寓</span><span class="tt-v">$${d.family_old[0].toLocaleString()}~${d.family_old[1].toLocaleString()}</span></div><div class="tt-r"><span class="tt-k">新大樓</span><span class="tt-v">$${d.family_new[0].toLocaleString()}~${d.family_new[1].toLocaleString()}</span></div>`;
      tt.style.display='block';
    });
    el.addEventListener('mousemove',e=>{
      const rc=wrap.getBoundingClientRect();
      let lf=e.clientX-rc.left+wrap.scrollLeft+16,tp=e.clientY-rc.top+wrap.scrollTop-12;
      if(lf+220>wrap.scrollLeft+rc.width)lf-=240;
      if(tp+180>wrap.scrollTop+rc.height)tp-=190;
      tt.style.left=lf+'px';tt.style.top=tp+'px';
    });
    el.addEventListener('mouseleave',()=>{
      const isTr=TRANSFERS.has(el.dataset.name);
      el.setAttribute('r',isTr?7:4.2);
      tt.style.display='none';
    });
  });
}
 
document.getElementById('mapTypeToggle').addEventListener('click',e=>{
  if(!e.target.classList.contains('mt-btn'))return;
  document.querySelectorAll('.mt-btn').forEach(b=>b.classList.remove('active'));
  e.target.classList.add('active');
  mapPK=e.target.dataset.mt;
  document.getElementById('mapModeLabel').textContent={studio_new:'套房新大樓',studio_old:'套房舊公寓',family_new:'三房新大樓',family_old:'三房舊公寓'}[mapPK];
  renderMap();
});
 
// ═══ TABLE & DASHBOARD ═══
let curLine='all',curType='studio',curSort='line',curSearch='';
(function(){document.getElementById('legendArea').innerHTML=Object.entries(LINES).map(([k,v])=>`<span class="ldot"><i style="background:${v.color}"></i>${v.name}</span>`).join('');let f=`<button class="fbtn active" data-line="all">全部</button>`;for(const[k,v] of Object.entries(LINES))f+=`<button class="fbtn" data-line="${k}"><span class="dot" style="background:${v.color}"></span>${v.name}</button>`;document.getElementById('lineFilters').innerHTML=f})();
function getF(){let d=DATA;if(curLine!=='all')d=d.filter(x=>x.line===curLine);if(curSearch){const s=curSearch.toLowerCase();d=d.filter(x=>x.station.toLowerCase().includes(s)||x.dist.toLowerCase().includes(s))}const pf=x=>{const p=curType==='studio'?x.studio_new:x.family_new;return(p[0]+p[1])/2};if(curSort==='price_asc')d=[...d].sort((a,b)=>pf(a)-pf(b));else if(curSort==='price_desc')d=[...d].sort((a,b)=>pf(b)-pf(a));else if(curSort==='heat')d=[...d].sort((a,b)=>b.heat-a.heat);return d}
const fmt=n=>n.toLocaleString(),avg=a=>(a[0]+a[1])/2;
function pC(v,t){if(t==='studio')return v>15000?'ph':v>11000?'pm':'pl';return v>38000?'ph':v>26000?'pm':'pl'}
function hD(n){return'●'.repeat(n)+'<span style="opacity:.12">●</span>'.repeat(5-n)}
function rStats(){const d=getF(),n=d.length;if(!n)return;const a=k=>d.reduce((s,x)=>s+avg(x[k]),0)/n;document.getElementById('statsRow').innerHTML=`<div class="sc s1"><div class="sc-l">站數</div><div class="sc-v">${n}<span style="font-size:11px;opacity:.4">/${DATA.length}</span></div></div><div class="sc s2"><div class="sc-l">套房舊公寓</div><div class="sc-v">$${fmt(Math.round(a('studio_old')/100)*100)}</div></div><div class="sc s3"><div class="sc-l">套房新大樓</div><div class="sc-v">$${fmt(Math.round(a('studio_new')/100)*100)}</div></div><div class="sc s4"><div class="sc-l">三房舊公寓</div><div class="sc-v">$${fmt(Math.round(a('family_old')/100)*100)}</div></div><div class="sc s5"><div class="sc-l">三房新大樓</div><div class="sc-v">$${fmt(Math.round(a('family_new')/100)*100)}</div></div>`}
function rTable(){const data=getF();const mx=curType==='studio'?27000:66000;let h='';data.forEach(d=>{const old=curType==='studio'?d.studio_old:d.family_old;const nw=curType==='studio'?d.studio_new:d.family_new;const L=LINES[d.line];const bS=(old[0]/mx*100).toFixed(0),bE=(nw[1]/mx*100).toFixed(0);h+=`<tr><td><span class="lb" style="background:${L.color}">${L.short}</span></td><td class="sn">${d.station}</td><td style="color:var(--text2);font-size:9px">${d.dist}</td><td class="pc ${pC(avg(old),curType)}">$${fmt(old[0])}~${fmt(old[1])}</td><td class="pc ${pC(avg(nw),curType)}">$${fmt(nw[0])}~${fmt(nw[1])}</td><td><div class="bar-bg"><div class="bar-fill" style="left:${bS}%;width:${bE-bS}%;background:linear-gradient(90deg,${L.color}55,${L.color})"></div></div></td><td class="heat">${hD(d.heat)}</td></tr>`});document.getElementById('mainTable').innerHTML=h;document.getElementById('countLabel').textContent=`${data.length}/${DATA.length}站`}
function hmC(v){if(v>40000)return'rgba(251,113,133,.65)';if(v>30000)return'rgba(251,113,133,.4)';if(v>22000)return'rgba(251,191,36,.4)';if(v>16000)return'rgba(251,191,36,.25)';if(v>11000)return'rgba(52,211,153,.28)';return'rgba(52,211,153,.14)'}
function rHM(){const lks=Object.keys(LINES);const cs=[{l:'套房舊公寓',k:'studio_old'},{l:'套房新大樓',k:'studio_new'},{l:'三房舊公寓',k:'family_old'},{l:'三房新大樓',k:'family_new'}];let h='<div class="hm-h"></div>';cs.forEach(c=>h+=`<div class="hm-h">${c.l}</div>`);lks.forEach(ln=>{const ld=DATA.filter(d=>d.line===ln),L=LINES[ln];h+=`<div class="hm-l"><span class="lb" style="background:${L.color};font-size:6px">${L.short}</span>${L.name}</div>`;cs.forEach(c=>{const vs=ld.map(d=>avg(d[c.k]));const a=vs.reduce((s,v)=>s+v,0)/vs.length;const lo=Math.min(...ld.map(d=>d[c.k][0])),hi=Math.max(...ld.map(d=>d[c.k][1]));h+=`<div class="hm-c" style="background:${hmC(a)}">${fmt(Math.round(a/100)*100)}<small>${fmt(lo)}~${fmt(hi)}</small></div>`})});document.getElementById('heatmapGrid').innerHTML=h}
function render(){rStats();rTable()}
document.getElementById('lineFilters').addEventListener('click',e=>{const b=e.target.closest('.fbtn');if(!b)return;document.querySelectorAll('.fbtn').forEach(x=>x.classList.remove('active'));b.classList.add('active');curLine=b.dataset.line;render()});
document.getElementById('typeToggle').addEventListener('click',e=>{if(!e.target.classList.contains('tbtn'))return;document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('active'));e.target.classList.add('active');curType=e.target.dataset.type;render()});
document.getElementById('sortSelect').addEventListener('change',e=>{curSort=e.target.value;render()});
document.getElementById('searchBox').addEventListener('input',e=>{curSearch=e.target.value.trim();render()});
render();rHM();renderMap();
</script>
