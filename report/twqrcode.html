<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>辦公室拆帳小助手 - TWQR 終極相容版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .gradient-bg { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .card-shadow { box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02); }
        .paid-row { opacity: 0.5; background-color: #f8fafc; filter: grayscale(1); }
        .qr-container canvas, .qr-container img { margin: 0 auto; display: block; border: 8px solid white; border-radius: 1rem; }
        
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop { animation: popIn 0.2s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

<nav class="gradient-bg text-white shadow-md sticky top-0 z-50">
    <div class="max-w-md mx-auto px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div class="bg-white/20 p-2 rounded-lg">
                <i class="fas fa-bolt text-yellow-300"></i>
            </div>
            <h1 class="text-lg font-black tracking-tight">TWQR 拆帳助手</h1>
        </div>
        <div class="bg-black/20 text-[10px] px-2 py-1 rounded-md font-mono">v2.1.0-FIX</div>
    </div>
</nav>

<main class="max-w-md mx-auto px-4 mt-6 space-y-6">

    <section class="bg-white rounded-[2rem] p-6 card-shadow border border-slate-100">
        <div class="flex items-center mb-5">
            <span class="bg-indigo-100 text-indigo-600 w-8 h-8 flex items-center justify-center rounded-full mr-3 text-xs">
                <i class="fas fa-cog"></i>
            </span>
            <h2 class="text-sm font-bold text-slate-800">我的收款設定</h2>
        </div>
        
        <div class="grid grid-cols-12 gap-3">
            <div class="col-span-4">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 ml-1">銀行代碼</label>
                <input type="text" id="bankCode" value="808" maxlength="3" 
                    oninput="this.value=this.value.replace(/\D/g,''); saveConfig();"
                    class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 text-sm font-black focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
            </div>
            <div class="col-span-8">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 ml-1">收款帳號</label>
                <input type="text" id="bankAccount" value="0015979011345" 
                    oninput="this.value=this.value.replace(/\D/g,''); saveConfig();"
                    class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 text-sm font-black tracking-wider focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
            </div>
        </div>
    </section>

    <section class="bg-white rounded-[2rem] p-6 card-shadow border border-slate-100 min-h-[400px]">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-sm font-bold text-slate-800">今日拆帳名單</h2>
            <button onclick="addRow()" class="bg-slate-900 text-white text-[10px] px-4 py-2 rounded-xl font-bold hover:bg-black active:scale-95 transition-all">
                <i class="fas fa-plus mr-1"></i> 新增成員
            </button>
        </div>

        <div id="orderList" class="space-y-3">
            <!-- 動態插入 -->
        </div>

        <!-- 統計數據 -->
        <div class="mt-10 pt-6 border-t border-slate-100 flex justify-between items-center">
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">總計金額</p>
                <p class="text-2xl font-black text-slate-900" id="totalDisplay">$ 0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">待收餘額</p>
                <p class="text-lg font-bold text-indigo-600" id="pendingDisplay">$ 0</p>
            </div>
        </div>
    </section>

</main>

<div id="qrModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center shadow-2xl relative animate-pop">
        
        <button onclick="closeModal()" class="absolute -top-12 left-1/2 -translate-x-1/2 text-white/60 hover:text-white transition-colors">
            <i class="fas fa-times-circle text-3xl"></i>
        </button>

        <div class="mb-4">
            <span class="bg-indigo-50 text-indigo-600 text-[10px] font-bold py-1 px-3 rounded-full tracking-widest uppercase text-center block w-fit mx-auto">TWQR Standard</span>
            <h3 class="text-2xl font-black text-slate-900 mt-2" id="modalPayer">同事 A</h3>
        </div>
        
        <div class="bg-slate-50 rounded-[2.5rem] p-6 mb-6">
            <div id="qrcode" class="qr-container bg-white p-1"></div>
            <div class="mt-4 text-4xl font-black text-indigo-600 tabular-nums" id="modalAmount">$ 0</div>
        </div>

        <div class="space-y-3">
            <button id="deepLinkBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-100 active:scale-[0.98] transition-all flex items-center justify-center space-x-2">
                <i class="fas fa-mobile-alt"></i>
                <span>手機一鍵觸發網銀</span>
            </button>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="markAsPaid()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-2xl text-xs transition-all">
                    已付清
                </button>
                <button onclick="copyInfo()" class="bg-slate-100 text-slate-600 font-bold py-3 rounded-2xl text-xs hover:bg-slate-200 transition-all">
                    複製帳號
                </button>
            </div>
        </div>
    </div>
</div>

<script>
let orders = [{ id: 1, name: '測試員', amount: 85, paid: false }];
let activeIdx = null;
let qrObj = null;

window.onload = () => {
    const saved = localStorage.getItem('twqr_data_v2');
    if (saved) {
        const data = JSON.parse(saved);
        if(data.bank) document.getElementById('bankCode').value = data.bank;
        if(data.acc) document.getElementById('bankAccount').value = data.acc;
        if(data.orders) orders = data.orders;
    }
    
    qrObj = new QRCode(document.getElementById("qrcode"), {
        width: 200, height: 200, colorDark: "#000000", colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
    });
    
    renderList();
};

function buildTWQRURL(bank, acc, amt) {
    // 1. 帳號補足 16 碼 (D6)
    const paddedAcc = acc.padStart(16, '0');
    // 2. 金額轉換成「分」(D1)
    const centAmt = Math.round(parseFloat(amt) * 100);
    // 3. 格式：TWQRP://{bank}NTTransfer/158/02/V1?D6={acc16}&D5={bank}&D1={amt_in_cents}&D10=901
    return `TWQRP://${bank}NTTransfer/158/02/V1?D6=${paddedAcc}&D5=${bank}&D1=${centAmt}&D10=901`;
}

function saveConfig() {
    const data = {
        bank: document.getElementById('bankCode').value,
        acc: document.getElementById('bankAccount').value,
        orders: orders
    };
    localStorage.setItem('twqr_data_v2', JSON.stringify(data));
}

function renderList() {
    const container = document.getElementById('orderList');
    container.innerHTML = '';
    let total = 0, pending = 0;

    orders.forEach((o, i) => {
        total += Number(o.amount || 0);
        if (!o.paid) pending += Number(o.amount || 0);

        const div = document.createElement('div');
        div.className = `flex items-center space-x-3 p-3 rounded-2xl border transition-all ${o.paid ? 'paid-row' : 'bg-white border-slate-100 shadow-sm'}`;
        div.innerHTML = `
            <input type="text" value="${o.name}" onchange="update(${i},'name',this.value)" placeholder="姓名" class="flex-1 bg-transparent font-bold text-sm outline-none min-w-0">
            <div class="flex items-center bg-slate-50 rounded-xl px-3 py-2 shrink-0">
                <span class="text-[10px] text-slate-400 font-bold mr-1">$</span>
                <input type="number" value="${o.amount}" onchange="update(${i},'amount',this.value)" class="w-16 bg-transparent text-sm font-black text-right outline-none">
            </div>
            <button onclick="showQR(${i})" class="shrink-0 w-10 h-10 rounded-xl ${o.paid?'bg-slate-100 text-slate-400':'bg-indigo-600 text-white shadow-lg shadow-indigo-100'} flex items-center justify-center transition-transform active:scale-90">
                <i class="fas fa-qrcode"></i>
            </button>
            <button onclick="removeRow(${i})" class="shrink-0 text-slate-300 hover:text-red-500 p-1"><i class="fas fa-times text-xs"></i></button>
        `;
        container.appendChild(div);
    });

    document.getElementById('totalDisplay').innerText = `$ ${total.toLocaleString()}`;
    document.getElementById('pendingDisplay').innerText = `$ ${pending.toLocaleString()}`;
    saveConfig();
}

function update(i, f, v) {
    orders[i][f] = (f === 'amount') ? (parseInt(v) || 0) : v;
    renderList();
}

function addRow() {
    orders.push({ id: Date.now(), name: '', amount: '', paid: false });
    renderList();
}

function removeRow(i) {
    orders.splice(i, 1);
    renderList();
}

function showQR(i) {
    const bank = document.getElementById('bankCode').value;
    const acc = document.getElementById('bankAccount').value;
    const o = orders[i];

    if (!bank || !acc || !o.amount) return;

    activeIdx = i;
    const payload = buildTWQRURL(bank, acc, o.amount);
    
    // 生成 QR Code
    qrObj.clear();
    qrObj.makeCode(payload);

    // 設定 Deep Link 按鈕邏輯
    document.getElementById('deepLinkBtn').onclick = () => {
        window.location.href = payload;
    };

    document.getElementById('modalPayer').innerText = o.name || '這名同事';
    document.getElementById('modalAmount').innerText = `$ ${o.amount}`;
    document.getElementById('qrModal').classList.remove('hidden');
}

function closeModal() { document.getElementById('qrModal').classList.add('hidden'); }

function markAsPaid() {
    if (activeIdx !== null) {
        orders[activeIdx].paid = true;
        renderList();
        closeModal();
    }
}

function copyInfo() {
    const b = document.getElementById('bankCode').value;
    const a = document.getElementById('bankAccount').value;
    const amt = orders[activeIdx].amount;
    const text = `轉帳資訊\n銀行代碼: ${b}\n帳號: ${a}\n金額: ${amt}元`;
    
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
}
</script>

</body>
</html>
