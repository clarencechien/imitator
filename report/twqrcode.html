<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>辦公室拆帳小助手 - 富邦實測版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        .gradient-bg { background: linear-gradient(135deg, #005595 0%, #0081c3 100%); }
        .card-shadow { box-shadow: 0 15px 30px -5px rgba(0, 0, 0, 0.05); }
        .paid-row { opacity: 0.5; background-color: #f8fafc; filter: grayscale(1); }
        .qr-container canvas, .qr-container img { margin: 0 auto; display: block; border: 4px solid white; border-radius: 0.75rem; }
        
        /* 避免 iOS 輸入框縮放 */
        input[type="text"], input[type="number"] { font-size: 16px !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

<nav class="gradient-bg text-white shadow-md sticky top-0 z-50">
    <div class="max-w-md mx-auto px-5 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <i class="fas fa-bolt text-yellow-300"></i>
            <h1 class="text-lg font-black tracking-tight">富邦拆帳助手</h1>
        </div>
        <div class="bg-black/20 text-[10px] px-2 py-1 rounded-md font-mono">v2.3.1-STABLE</div>
    </div>
</nav>

<main class="max-w-md mx-auto px-4 mt-6 space-y-6">

    <!-- 收款設定卡片 -->
    <section class="bg-white rounded-[2rem] p-6 card-shadow border border-slate-100">
        <div class="flex items-center mb-5">
            <span class="bg-sky-100 text-sky-600 w-8 h-8 flex items-center justify-center rounded-full mr-3 text-xs">
                <i class="fas fa-cog"></i>
            </span>
            <h2 class="text-sm font-bold text-slate-800">我的收款設定 (富邦 012)</h2>
        </div>
        
        <div class="grid grid-cols-12 gap-3">
            <div class="col-span-4">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 ml-1">銀行代碼</label>
                <input type="text" id="bankCode" value="012" maxlength="3" readonly
                    class="w-full bg-slate-100 border-none rounded-2xl px-4 py-3 text-sm font-black text-slate-400 outline-none">
            </div>
            <div class="col-span-8">
                <label class="block text-[10px] font-bold text-slate-400 mb-1 ml-1">收款帳號</label>
                <input type="text" id="bankAccount" value="0015979011345" 
                    oninput="this.value=this.value.replace(/\D/g,''); saveConfig();"
                    class="w-full bg-slate-50 border-none rounded-2xl px-4 py-3 text-sm font-black tracking-wider focus:ring-2 focus:ring-sky-500 outline-none">
            </div>
        </div>
    </section>

    <!-- 名單列表卡片 -->
    <section class="bg-white rounded-[2rem] p-6 card-shadow border border-slate-100 min-h-[400px]">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-sm font-bold text-slate-800">今日拆帳名單</h2>
            <button onclick="addRow()" class="bg-slate-900 text-white text-[10px] px-4 py-2.5 rounded-xl font-bold hover:bg-black active:scale-95 transition-all">
                <i class="fas fa-plus mr-1"></i> 新增成員
            </button>
        </div>

        <div id="orderList" class="space-y-3">
            <!-- 項目將由 JS 插入 -->
        </div>

        <!-- 統計數據 -->
        <div class="mt-10 pt-6 border-t border-slate-100 flex justify-between items-center">
            <div>
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">總計金額</p>
                <p class="text-2xl font-black text-slate-900" id="totalDisplay">$ 0</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">待收餘額</p>
                <p class="text-lg font-bold text-sky-600" id="pendingDisplay">$ 0</p>
            </div>
        </div>
    </section>
</main>

<!-- QR Code 彈窗 -->
<div id="qrModal" class="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] hidden flex items-center justify-center p-6">
    <div class="bg-white w-full max-w-sm rounded-[3rem] p-8 text-center shadow-2xl relative">
        
        <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300">
            <i class="fas fa-times-circle text-2xl"></i>
        </button>

        <div class="mb-4 pt-4">
            <span class="bg-sky-50 text-sky-600 text-[10px] font-bold py-1 px-3 rounded-full tracking-widest uppercase">TWQR Standard</span>
            <h3 class="text-2xl font-black text-slate-900 mt-2" id="modalPayer">同事 A</h3>
        </div>
        
        <div class="bg-slate-50 rounded-[2.5rem] p-6 mb-6">
            <div id="qrcode" class="qr-container bg-white p-1"></div>
            <div class="mt-4 text-4xl font-black text-sky-600 tabular-nums" id="modalAmount">$ 0</div>
        </div>

        <div class="space-y-3">
            <!-- 富邦專屬 Deep Link 嘗試按鈕 -->
            <button id="deepLinkBtn" class="w-full bg-sky-600 hover:bg-sky-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-sky-100 active:scale-[0.98] transition-all flex flex-col items-center justify-center">
                <span class="flex items-center space-x-2">
                    <i class="fas fa-mobile-alt"></i>
                    <span>嘗試一鍵喚醒富邦網銀</span>
                </span>
                <span class="text-[9px] opacity-60 mt-0.5 font-normal">若無法自動帶入金額，請改用掃描</span>
            </button>
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="markAsPaid()" class="bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 rounded-2xl text-xs transition-all">
                    標記已付清
                </button>
                <button onclick="copyPaymentInfo()" class="bg-slate-100 text-slate-600 font-bold py-3 rounded-2xl text-xs hover:bg-slate-200 transition-all flex items-center justify-center">
                    <i class="fas fa-copy mr-1"></i> 複製帳號
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 吐司通知 -->
<div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white px-6 py-3 rounded-full text-sm font-bold shadow-2xl z-[150] hidden">
    已複製轉帳資訊！
</div>

<script>
let orders = [{ id: 1, name: '測試員', amount: 85, paid: false }];
let activeIdx = null;
let qrObj = null;

window.onload = () => {
    const saved = localStorage.getItem('twqr_fubon_v1');
    if (saved) {
        const data = JSON.parse(saved);
        if(data.acc) document.getElementById('bankAccount').value = data.acc;
        if(data.orders && data.orders.length > 0) orders = data.orders;
    }
    
    qrObj = new QRCode(document.getElementById("qrcode"), {
        width: 200, height: 200, colorDark: "#000000", colorLight: "#ffffff",
        correctLevel: QRCode.CorrectLevel.M
    });
    
    renderList();
};

function saveConfig() {
    const data = {
        acc: document.getElementById('bankAccount').value,
        orders: orders
    };
    localStorage.setItem('twqr_fubon_v1', JSON.stringify(data));
}

// 產生 TWQRP 格式連結 (富邦 App 內部掃碼識別率最高)
function buildTWQRURL(bank, acc, amt) {
    const paddedAcc = acc.padStart(16, '0');
    const centAmt = Math.round(parseFloat(amt) * 100);
    return `TWQRP://${bank}NTTransfer/158/02/V1?D6=${paddedAcc}&D5=${bank}&D1=${centAmt}&D10=901`;
}

function renderList() {
    const container = document.getElementById('orderList');
    container.innerHTML = '';
    let total = 0, pending = 0;

    orders.forEach((o, i) => {
        total += Number(o.amount || 0);
        if (!o.paid) pending += Number(o.amount || 0);

        const div = document.createElement('div');
        div.className = `flex items-center space-x-2 p-3 rounded-2xl border transition-all ${o.paid ? 'paid-row' : 'bg-white border-slate-100 shadow-sm'}`;
        
        div.innerHTML = `
            <input type="text" value="${o.name}" 
                oninput="update(${i},'name',this.value)" 
                placeholder="姓名" 
                class="flex-1 min-w-0 bg-transparent font-bold text-sm outline-none">
            
            <div class="flex items-center bg-slate-50 rounded-xl px-2 py-2 shrink-0 border border-slate-100">
                <span class="text-[10px] text-slate-400 font-bold mr-1">$</span>
                <input type="number" value="${o.amount}" 
                    oninput="update(${i},'amount',this.value)" 
                    class="w-14 bg-transparent text-sm font-black text-right outline-none text-sky-600">
            </div>

            <button onclick="showQR(${i})" 
                class="shrink-0 w-10 h-10 rounded-xl ${o.paid?'bg-slate-100 text-slate-300':'bg-sky-600 text-white shadow-md shadow-sky-100'} flex items-center justify-center active:scale-90 transition-all">
                <i class="fas fa-qrcode"></i>
            </button>

            <button onclick="removeRow(${i})" 
                class="shrink-0 text-slate-300 hover:text-red-500 p-1">
                <i class="fas fa-trash text-xs"></i>
            </button>
        `;
        container.appendChild(div);
    });

    document.getElementById('totalDisplay').innerText = `$ ${total.toLocaleString()}`;
    document.getElementById('pendingDisplay').innerText = `$ ${pending.toLocaleString()}`;
    saveConfig();
}

function update(i, f, v) {
    orders[i][f] = (f === 'amount') ? (parseInt(v) || 0) : v;
    renderList();
}

function addRow() {
    orders.push({ id: Date.now(), name: '', amount: '', paid: false });
    renderList();
}

function removeRow(i) {
    orders.splice(i, 1);
    renderList();
}

function showQR(i) {
    const bank = "012";
    const acc = document.getElementById('bankAccount').value;
    const o = orders[i];

    if (!acc || !o.amount) return;

    activeIdx = i;
    const payload = buildTWQRURL(bank, acc, o.amount);
    
    qrObj.clear();
    qrObj.makeCode(payload);

    // 富邦 Deep Link 嘗試
    document.getElementById('deepLinkBtn').onclick = () => {
        // 嘗試使用富邦行動銀行的 Scheme
        window.location.href = `fubonmobile://`; 
        
        setTimeout(() => {
            showToast("已嘗試開啟 App，若未自動跳轉轉帳，請掃描 QR Code");
        }, 1000);
    };

    document.getElementById('modalPayer').innerText = o.name || '這名同事';
    document.getElementById('modalAmount').innerText = `$ ${o.amount}`;
    document.getElementById('qrModal').classList.remove('hidden');
}

function closeModal() { document.getElementById('qrModal').classList.add('hidden'); }

function markAsPaid() {
    if (activeIdx !== null) {
        orders[activeIdx].paid = true;
        renderList();
        closeModal();
    }
}

function copyPaymentInfo() {
    const b = "012";
    const a = document.getElementById('bankAccount').value;
    const amt = orders[activeIdx].amount;
    const text = `轉帳資訊\n銀行代碼: ${b} (富邦)\n帳號: ${a}\n金額: ${amt} 元`;
    
    const el = document.createElement('textarea');
    el.value = text;
    document.body.appendChild(el);
    el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast("資訊已複製！");
}

function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg;
    t.classList.remove('hidden');
    setTimeout(() => t.classList.add('hidden'), 3000);
}
</script>

</body>
</html>
